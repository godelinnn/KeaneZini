<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>keane • links</title>
  <style>
    :root{
      --bg:#f2f3f5;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --btn:#f8fafc;
      --btnBorder:#e5e7eb;
      --shadow: 0 12px 30px rgba(0,0,0,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding: 28px 12px 40px;
    }
    .wrap{ width:min(420px, 100%); }

    .card{
      background: rgba(255,255,255,.95);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 26px;
      padding: 30px 18px 24px;
      box-shadow: var(--shadow);
    }

    .center{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .avatar{
      width:86px; height:86px;
      border-radius:999px;
      object-fit:cover;
      border: 5px solid rgba(0,0,0,.06);
      background:#fff;
    }

    h1{
      margin: 14px 0 10px;
      font-size: 26px;
    }

    .icons{
      display:flex;
      gap: 10px;
      margin: 8px 0 20px;
    }

    .iconbtn{
      width:42px; height:42px;
      border-radius:12px;
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      display:grid; place-items:center;
      text-decoration:none;
      color: var(--text);
      transition: .2s;
    }

    .iconbtn:hover{
      transform: translateY(-2px);
      opacity:.9;
    }

    .links{
      display:grid;
      gap: 12px;
      width:100%;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
      padding: 14px 14px;
      border-radius: 14px;
      background: var(--btn);
      border:1px solid var(--btnBorder);
      text-decoration:none;
      color: var(--text);
      font-weight: 700;
      transition: .2s;
    }

    .btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
    }

    .left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    svg{ width:22px; height:22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="center">

        <img class="avatar" src="https://via.placeholder.com/200" alt="Foto">

        <h1>keane</h1>

        <div class="icons">
          <!-- Instagram -->
          <a class="iconbtn" href="https://instagram.com/SEUUSUARIO" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.5" cy="6.5" r="1"></circle>
            </svg>
          </a>

          <!-- WhatsApp -->
          <a class="iconbtn" href="https://wa.me/55DDDNÚMERO" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.4L3 20l1.3-4.9A8.5 8.5 0 1 1 21 11.5Z"></path>
            </svg>
          </a>

          <!-- LinkedIn -->
          <a class="iconbtn" href="https://linkedin.com/in/SEUPERFIL" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M4.98 3.5C4.98 4.88 3.87 6 2.49 6S0 4.88 0 3.5 1.11 1 2.49 1s2.49 1.12 2.49 2.5zM.22 8.09H4.8V24H.22zM7.98 8.09h4.39v2.16h.06c.61-1.16 2.11-2.39 4.35-2.39 4.65 0 5.5 3.06 5.5 7.04V24h-4.58v-7.97c0-1.9-.03-4.35-2.65-4.35-2.65 0-3.06 2.07-3.06 4.21V24H7.98z"/>
            </svg>
          </a>
        </div>

        <div class="links">
          <a class="btn" href="https://wa.me/5544999070884?text=WhatsappKeane" target="_blank">
            <span class="left">WhatsApp</span>
            <span>⋮</span>
          </a>

          <a class="btn" href="https://www.instagram.com/keane_adv?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
            <span class="left">Instagram</span>
            <span>⋮</span>
          </a>

          <a class="btn" href="https://linkedin.com/in/SEUPERFIL" target="_blank">
            <span class="left">LinkedIn</span>
            <span>⋮</span>
          </a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
